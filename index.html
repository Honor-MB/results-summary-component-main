<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>

    <main>

      <!-- ------------RESULT SECTION------------ -->

      <section class="result">
        <h2 class="your__result">Your Result</h2>
        <div class="result__display">
          <span class="result__score">76</span>
          <span class="result__total">of 100</span>
        </div>
        <div class="result__message-rapper">
          <h1 class="result__message-title">Great</h1>
          <p class="result__message">You scored higher than 65% of the people who have taken these tests.</p>
        </div>
      </section>

      <!-- ------------SUMMARY SECTION------------ -->

      <section class="test__summary">
        <h2 class="test__title">Summary</h2>

        <div class="test reaction">
          <div class="test__details">
            <img class="test__icon" src="./assets/images/icon-reaction.svg" alt="Reaction icon">
            <p class="test__name">Reaction</p>
          </div>
          <div class="test__result">
            <span class="test__score">80</span>
            <span class="test__total">/ 100</span>
          </div>
        </div>
        
        <div class="test memory">
          <div class="test__details">
            <img class="test__icon" src="./assets/images/icon-memory.svg" alt="Memory icon">
            <p class="test__name ">Memory</p>
          </div>
          <div class="test__result">
            <span class="test__score">92</span>
            <span class="test__total">/ 100</span>
          </div>
        </div>

        <div class="test verbal">
          <div class="test__details">
            <img class="test__icon" src="./assets/images/icon-verbal.svg" alt="Verbal icon">
            <p class="test__name ">Verbal</p>
          </div>
          <div class="test__result">
            <span class="test__score">61</span>
            <span class="test__total">/ 100</span>
          </div>
        </div>

        <div class="test visual">
          <div class="test__details">
            <img class="test__icon" src="./assets/images/icon-visual.svg" alt="Visual icon">
            <p class="test__name ">Visual</p>
          </div>
          <div class="test__result">
            <span class="test__score">73</span>
            <span class="test__total">/ 100</span>
          </div>
        </div>

        <button class="btn test__btn">Continue</button>
      </section>

    </main>
  </body>
</html>
